name: miva_fid
description: Plateforme de fidélité digitale pour commerces locaux — Lomé, Togo
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State & Navigation
  flutter_riverpod: ^2.5.3
  riverpod_annotation: ^2.5.3
  go_router: ^13.2.0

  # Backend
  supabase_flutter: ^2.5.0

  # Local storage
  hive_ce_flutter: ^2.0.0
  flutter_secure_storage: ^9.0.0

  # QR
  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0

  # Animations
  flutter_animate: ^4.5.0
  confetti: ^0.7.0

  # PDF
  pdf: ^3.10.8
  printing: ^5.12.0

  # Push notifications
  firebase_core: ^2.32.0
  firebase_messaging: ^14.9.4
  flutter_local_notifications: ^17.2.2

  # Images
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  dio: ^5.4.3
  connectivity_plus: ^6.0.3
  flutter_haptic_feedback: ^1.0.1

  # Charts
  fl_chart: ^0.68.0

  # NFC (optional)
  nfc_manager: ^3.3.0

  # Fonts & SVG
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.4
  build_runner: ^2.4.9
  hive_ce_generator: ^1.0.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/svg/
    - assets/images/
    - assets/fonts/
